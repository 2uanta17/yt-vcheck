<div class="table-container mat-elevation-z2">
  <div class="mat-mdc-table dense-table">
    <!-- Header Row (Static/Sticky-like) -->
    <div class="mat-mdc-header-row header-shadow">
      <div class="mat-mdc-header-cell mat-column-thumbnail"></div>
      <div class="mat-mdc-header-cell mat-column-details">Track Details</div>
      <div class="mat-mdc-header-cell mat-column-status">Status</div>
      <div class="mat-mdc-header-cell mat-column-actions"></div>
    </div>

    <!-- Virtual Scroll Viewport for Rows -->
    <cdk-virtual-scroll-viewport
      itemSize="110"
      class="track-viewport"
      [minBufferPx]="440"
      [maxBufferPx]="880"
    >
      <div *cdkVirtualFor="let track of tracks()" class="mat-mdc-row">
        <!-- Thumbnail Column -->
        <div class="mat-mdc-cell mat-column-thumbnail">
          <img
            [src]="track.thumbnailUrl"
            [alt]="track.title"
            class="track-thumbnail"
            loading="lazy"
          />
        </div>

        <!-- Details Column -->
        <div class="mat-mdc-cell mat-column-details">
          <div class="details-container">
            <span class="track-title" [title]="track.title">{{ track.title }}</span>
            <span class="channel-title">{{ track.channelTitle }}</span>
          </div>
        </div>

        <!-- Status Column -->
        <div class="mat-mdc-cell mat-column-status">
          <mat-chip-set>
            @if (track.isUnavailable) {
              <mat-chip-row highlighted color="warn" class="status-chip">
                Unavailable: {{ track.unavailableReason }}
              </mat-chip-row>
            } @else {
              <mat-chip-row class="status-chip success-chip"> Available </mat-chip-row>
            }
          </mat-chip-set>
        </div>

        <!-- Actions Column -->
        <div class="mat-mdc-cell mat-column-actions">
          <button mat-icon-button color="primary" aria-label="Action placeholder">
            <mat-icon>more_vert</mat-icon>
          </button>
        </div>
      </div>

      <!-- Empty State -->
      @if (tracks().length === 0) {
        <div class="no-data-cell">No tracks found.</div>
      }
    </cdk-virtual-scroll-viewport>
  </div>
</div>
