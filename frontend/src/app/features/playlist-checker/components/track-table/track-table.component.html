<div class="table-container mat-elevation-z2">
  <table mat-table [dataSource]="tracks()" class="dense-table">
    <!-- Thumbnail Column -->
    <ng-container matColumnDef="thumbnail">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let track">
        <img
          [src]="track.thumbnailUrl"
          [alt]="track.title"
          class="track-thumbnail"
          loading="lazy"
        />
      </td>
    </ng-container>

    <!-- Details Column -->
    <ng-container matColumnDef="details">
      <th mat-header-cell *matHeaderCellDef>Track Details</th>
      <td mat-cell *matCellDef="let track">
        <div class="details-container">
          <span class="track-title">{{ track.title }}</span>
          <span class="channel-title">{{ track.channelTitle }}</span>
        </div>
      </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let track">
        <mat-chip-set>
          @if (track.isUnavailable) {
            <mat-chip-row highlighted color="warn" class="status-chip">
              Unavailable: {{ track.unavailableReason }}
            </mat-chip-row>
          } @else {
            <mat-chip-row class="status-chip success-chip"> Available </mat-chip-row>
          }
        </mat-chip-set>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let track">
        <button mat-icon-button color="primary" aria-label="Action placeholder">
          <mat-icon>more_vert</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell no-data-cell" colspan="4">No tracks found.</td>
    </tr>
  </table>
</div>
